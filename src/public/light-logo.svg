<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 6 100 100" width="256" height="256" role="img" aria-label="illegalCreed">
  <!-- 浅色背景版:对称等距阶梯塔 + 顶部立体星 -->
  <defs>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dbeafe"/><stop offset="1" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>
  <!-- 地面投影 -->
  <ellipse cx="60" cy="90" rx="31" ry="4.3" fill="#1e3a8a" opacity="0.2"/>
  <!-- 三层阶梯塔(亮踏面 / 中踢面 / 暗侧面) -->
  <g stroke="#0b2545" stroke-width="0.6" stroke-linejoin="round">
    <path d="M60 49 L90 64 L60 79 L30 64 Z" fill="url(#top)"/>
    <path d="M30 64 L60 79 L60 91 L30 76 Z" fill="#3b82f6"/>
    <path d="M90 64 L60 79 L60 91 L90 76 Z" fill="#1e40af"/>
    <path d="M60 41.5 L81 52 L60 62.5 L39 52 Z" fill="url(#top)"/>
    <path d="M39 52 L60 62.5 L60 74.5 L39 64 Z" fill="#3b82f6"/>
    <path d="M81 52 L60 62.5 L60 74.5 L81 64 Z" fill="#1e40af"/>
    <path d="M60 34 L72 40 L60 46 L48 40 Z" fill="url(#top)"/>
    <path d="M48 40 L60 46 L60 58 L48 52 Z" fill="#3b82f6"/>
    <path d="M72 40 L60 46 L60 58 L72 52 Z" fill="#1e40af"/>
  </g>
  <!-- 立体星:下尖落在塔顶方块中心 (60,40) -->
  <g transform="translate(60,29) scale(0.58)">
    <path d="M0 0 L0 -19 L3.9 -3.9 Z" fill="#fcd34d"/>
    <path d="M0 0 L3.9 -3.9 L19 0 Z" fill="#fbbf24"/>
    <path d="M0 0 L19 0 L3.9 3.9 Z" fill="#e89a37"/>
    <path d="M0 0 L3.9 3.9 L0 19 Z" fill="#e89a37"/>
    <path d="M0 0 L0 19 L-3.9 3.9 Z" fill="#f59e0b"/>
    <path d="M0 0 L-3.9 3.9 L-19 0 Z" fill="#f59e0b"/>
    <path d="M0 0 L-19 0 L-3.9 -3.9 Z" fill="#fde68a"/>
    <path d="M0 0 L-3.9 -3.9 L0 -19 Z" fill="#fde68a"/>
    <path d="M0 -19 L3.9 -3.9 L19 0 L3.9 3.9 L0 19 L-3.9 3.9 L-19 0 L-3.9 -3.9 Z"
          fill="none" stroke="#b45309" stroke-width="1" stroke-linejoin="round"/>
  </g>
</svg>
